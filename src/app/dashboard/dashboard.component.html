<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="mb-0">Employee KPI Dashboard</h4>
  <div>
    <span class="badge bg-secondary me-2">Poll #{{ pollCount }}</span>
    <span class="text-muted small">Last updated: {{ lastUpdated || 'waiting for first poll…' }}</span>
  </div>
</div>

<div *ngIf="kpiData.length === 0" class="text-center py-5 text-muted">
  <div class="spinner-border" role="status"></div>
  <p class="mt-2">Waiting for first 5-second poll…</p>
</div>

<!--

> We’re using `trackBy` so Angular doesn’t recreate everything on every refresh.
> If we don’t use it, `*ngFor` will rebuild each `KpiCardComponent` every time the data updates, since the object reference changes — and that can hide some `OnPush` issues.
> With `trackBy`, Angular keeps the same components and just updates the inputs, which makes it easier to notice if we’re mutating data instead of creating a new object.

-->
<div class="row row-cols-1 row-cols-md-3 g-3">
  <div class="col" *ngFor="let emp of kpiData; trackBy: trackById">
    <app-kpi-card [kpi]="emp" [isBuggy]="isBuggyOnPush"></app-kpi-card>
  </div>
</div>
