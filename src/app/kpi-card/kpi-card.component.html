<div class="card h-100 shadow-sm" [class.border-danger]="isBuggy" [class.border-success]="!isBuggy">
  <div class="card-body">

    <div class="d-flex justify-content-between align-items-start">
      <div>
        <h6 class="card-title mb-0">{{ kpi.name }}</h6>
        <small class="text-muted">{{ kpi.department }}</small>
      </div>
      <div class="d-flex flex-column align-items-end gap-1">
        <span class="badge {{ getStatusBadge(kpi.status) }}">{{ kpi.status }}</span>
        <span *ngIf="isBuggy"  class="badge bg-danger"  title="Mutation bug: same object reference — OnPush skips this card">BUGGY</span>
        <span *ngIf="!isBuggy" class="badge bg-success" title="Fixed: spread operator creates a new reference — OnPush re-renders">FIXED</span>
      </div>
    </div>

    <div class="mt-3 mb-1 d-flex justify-content-between">
      <small>Performance Score</small>
      <small><strong>{{ kpi.score }}%</strong></small>
    </div>
    <div class="progress mb-2" style="height: 8px;">
      <div class="progress-bar {{ getProgressBar(kpi.score) }}"
           [style.width.%]="kpi.score">
      </div>
    </div>

    <p class="card-text mb-0 small">
      Tasks: <strong>{{ kpi.tasksCompleted }}&nbsp;/&nbsp;{{ kpi.tasksTotal }}</strong> completed
    </p>

  </div>
</div>
